<body class="min-h-screen text-custom-text antialiased font-body-md flex flex-col items-center justify-center py-section-gap px-gutter">
<!-- Top Navigation Placeholder (Hidden for this specific layout as it's an editorial content screen) -->
<main class="w-full max-w-[1000px] mx-auto flex flex-col gap-12">
<!-- Header Section -->
<header class="flex flex-col gap-4 items-center">
<span class="text-[14px] font-semibold tracking-widest text-custom-label uppercase">BEFORE — Documint</span>
<h1 class="text-[40px] font-bold leading-tight text-center">매 요청마다 Run-time 속도 저하</h1>
</header>
<!-- Divider -->
<div class="w-full h-px bg-custom-border"></div>
<!-- Bento Grid / Card Row -->
<div class="grid grid-cols-1 gap-6 md:grid-cols-2">
<!-- Card 1 -->
<div class="bg-surface-container-lowest border border-custom-border rounded-2xl p-8 flex flex-col justify-center gap-2">
<span class="text-custom-text text-headline-md text-center">1~3분</span>
<span class="text-body-md text-custom-subtext text-center">요청당 소요시간</span>
</div>
<!-- Card 2 -->
<div class="bg-surface-container-lowest border border-custom-border rounded-2xl p-8 flex flex-col justify-center gap-2">
<span class="text-custom-text text-headline-md text-center">콜드 스타트</span>
<span class="text-body-md text-custom-subtext text-center">Documint Run-time</span>
</div>
<!-- Card 3 -->
<div class="bg-surface-container-lowest border border-custom-border rounded-2xl p-8 flex flex-col justify-center gap-2">
<span class="text-custom-text text-headline-md text-center">1개 문서</span>
<span class="text-body-md text-custom-subtext text-center">요청당 단일 스크립트만 지원</span>
</div>
<div class="bg-surface-container-lowest border border-custom-border rounded-2xl p-8 flex flex-col justify-center gap-2">
<span class="text-custom-text text-headline-md text-center">데이터 수정</span>
<span class="text-body-md text-custom-subtext text-center">코드값을 다양하게 수정 할 수 없어 기존에 제시된 데이터로만 시각적 제시 한계</span>
</div></div>
<!-- Footer Note -->
<footer class="mt-4 flex justify-center">
<p class="text-body-md text-custom-label italic text-center">→ 문서 유형 추가 시 워크플로우 전체 재구성 필요</p>
</footer>
