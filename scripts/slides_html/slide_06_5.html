<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Concept Origin — Andrej Karpathy</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#1D1D1F",
                    "secondary": "#86868B",
                    "surface": "#FFFFFF",
                    "background": "#F5F5F7",
                    "outline-variant": "#D2D2D7",
                    "on-surface-variant": "#6E6E73"
                },
                spacing: {
                    "gutter": "32px",
                    "margin": "40px",
                    "stack-gap": "24px",
                    "unit": "8px"
                },
                fontFamily: {
                    "display-2xl": ["Inter"],
                    "display-xl": ["Inter"],
                    "headline-md": ["Inter"],
                    "body-md": ["Inter"],
                    "label-sm": ["Inter"]
                },
                fontSize: {
                    "display-2xl": ["80px", { "lineHeight": "1.05", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                    "display-xl": ["56px", { "lineHeight": "1.1", "letterSpacing": "-0.015em", "fontWeight": "700" }],
                    "headline-md": ["24px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                    "body-md": ["17px", { "lineHeight": "1.5", "letterSpacing": "0em", "fontWeight": "400" }],
                    "label-sm": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }]
                }
            }
        }
    }
</script>
<style>
    body { font-family: 'Inter', sans-serif; background-color: #F5F5F7; color: #1D1D1F; }
</style>
</head>
<body class="min-h-screen flex flex-col">

<!-- Header -->
<header class="w-full px-gutter h-14 flex items-center border-b border-outline-variant bg-background">
    <span class="font-label-sm text-label-sm uppercase tracking-[0.12em] text-on-surface-variant">Strategy.Alpha</span>
</header>

<!-- Main content -->
<main class="flex-grow flex items-center max-w-[1200px] mx-auto w-full px-gutter py-margin">
    <div class="grid grid-cols-2 gap-[80px] w-full items-center">

        <!-- Left column -->
        <div class="flex flex-col gap-[32px]">

            <!-- Label + rule -->
            <div>
                <p class="font-label-sm text-label-sm uppercase tracking-[0.12em] text-on-surface-variant mb-3">Concept Origin</p>
                <div class="w-[48px] h-[1.5px] bg-outline-variant"></div>
            </div>

            <!-- Name -->
            <h1 class="font-display-2xl text-display-2xl text-primary leading-none">Andrej<br/>Karpathy</h1>

            <!-- Tags -->
            <div class="flex gap-3 flex-wrap">
                <span class="border border-outline-variant rounded-full px-4 py-1.5 text-[15px] font-medium text-primary">Tesla AI Director (前)</span>
                <span class="border border-outline-variant rounded-full px-4 py-1.5 text-[15px] font-medium text-primary">OpenAI 공동창업자</span>
            </div>

            <!-- Quote -->
            <p class="text-[18px] font-bold italic leading-[1.5] text-primary">
                "LLM을 활용한 주기적 분석 자동화 —<br/>반복적 리서치를 AI가 대신 수행한다"
            </p>

            <!-- Blockquote -->
            <blockquote class="border-l-[3px] border-outline-variant pl-5">
                <p class="text-[15px] text-on-surface-variant leading-[1.6]">
                    SCM AutoResearch는 이 방법론에서 착안: 매주 Airtable TMS 데이터를 자동 분석, KPI 인사이트 자동 생성
                </p>
            </blockquote>

        </div>

        <!-- Right column — portrait -->
        <div class="flex items-center justify-center">
            <div class="w-[360px] h-[440px] rounded-2xl overflow-hidden bg-gradient-to-br from-[#E5E5EA] to-[#C7C7CC] flex items-end justify-center relative">
                <!-- grayscale gradient silhouette -->
                <div class="absolute inset-0 bg-gradient-to-t from-[#3A3A3C]/30 to-transparent"></div>
                <div class="absolute bottom-0 left-0 right-0 h-[40%] bg-gradient-to-t from-[#1D1D1F]/10 to-transparent"></div>
                <!-- name watermark -->
                <div class="relative z-10 mb-6 text-center">
                    <p class="font-label-sm text-label-sm uppercase tracking-widest text-[#6E6E73]">Andrej Karpathy</p>
                </div>
            </div>
        </div>

    </div>
</main>

<!-- Footer -->
<footer class="w-full px-gutter py-4 flex justify-between items-center border-t border-outline-variant bg-background">
    <span class="font-label-sm text-label-sm text-on-surface-variant">Internal Team Alpha • 2024</span>
    <span class="font-label-sm text-label-sm text-on-surface-variant">6.5 / 11</span>
</footer>

</body>
</html>
