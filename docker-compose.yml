# SCM 로컬 분석 스택
# NocoDB  → http://localhost:8080  (Airtable 대체, 테이블 탐색)
# Metabase → http://localhost:3000  (차트/대시보드)
#
# 실행: docker compose up -d
# 종료: docker compose down
# 로그: docker compose logs -f

services:
  nocodb:
    image: nocodb/nocodb:latest
    container_name: scm-nocodb
    ports:
      - "8080:8080"
    volumes:
      - nocodb_data:/usr/app/data
    environment:
      NC_DISABLE_TELE: "true"   # 텔레메트리 비활성화
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped

  metabase:
    image: metabase/metabase:latest
    container_name: scm-metabase
    ports:
      - "3000:3000"
    volumes:
      - metabase_data:/metabase-data
    environment:
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped

volumes:
  nocodb_data:    # NocoDB 메타데이터 (연결 설정, 뷰 등)
  metabase_data:  # Metabase 메타데이터 (대시보드, 쿼리 등)
