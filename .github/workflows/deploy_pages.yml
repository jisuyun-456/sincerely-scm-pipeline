name: Deploy Dashboard to Pages

on:
  schedule:
    - cron: '0 0 * * 1'   # 매주 월요일 00:00 UTC = 09:00 KST → weekly_review
    - cron: '0 0 1 * *'   # 매월  1일  00:00 UTC = 09:00 KST → monthly
  workflow_dispatch:
    inputs:
      report_mode:
        description: '리포트 모드 선택'
        type: choice
        options:
          - weekly_review    # 지난주 월~금 실적
          - weekly_forecast  # 지난주 기반 이번주 예측
          - monthly          # 지난달 전체 실적
        default: weekly_review

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect report mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.report_mode }}" >> $GITHUB_OUTPUT
          elif [ "$(date +%d)" = "01" ]; then
            echo "mode=monthly" >> $GITHUB_OUTPUT
          else
            echo "mode=weekly_review" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate pages_data.json
        env:
          AIRTABLE_API_KEY_WMS: ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE_WMS_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          REPORT_MODE: ${{ steps.mode.outputs.mode }}
        run: python generate_pages_data.py

      - name: Prepare site
        run: |
          mkdir -p site
          cp dashboard.html site/index.html
          cp pages_data.json site/pages_data.json

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
