name: Deploy Dashboard to Pages

on:
  workflow_run:
    workflows:
      - "WMS Weekly Report"
      - "WMS Monthly Report"
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate pages_data.json
        env:
          AIRTABLE_API_KEY_WMS: ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE_WMS_ID: ${{ secrets.AIRTABLE_BASE_ID }}
        run: python generate_pages_data.py

      - name: Prepare site
        run: |
          mkdir -p site
          cp dashboard.html site/index.html
          cp pages_data.json site/pages_data.json

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
