name: Deploy Dashboard to Pages

on:
  schedule:
    - cron: '0 0 * * 1'   # 매주 월요일 00:00 UTC = 09:00 KST → weekly_review
    - cron: '0 0 1 * *'   # 매월  1일  00:00 UTC = 09:00 KST → monthly
  workflow_dispatch:
    inputs:
      report_mode:
        description: '리포트 모드 선택'
        type: choice
        options:
          - weekly_review
          - weekly_forecast
          - monthly
        default: weekly_review

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect report mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.report_mode }}" >> $GITHUB_OUTPUT
          elif [ "$(date +%d)" = "01" ]; then
            echo "mode=monthly" >> $GITHUB_OUTPUT
          else
            echo "mode=weekly_review" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate pages_data.json
        env:
          AIRTABLE_API_KEY_WMS: ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE_WMS_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          REPORT_MODE: ${{ steps.mode.outputs.mode }}
        run: python generate_pages_data.py

      - name: Save to history & build index
        run: |
          mkdir -p history
          PERIOD_KEY=$(python -c "import json; print(json.load(open('pages_data.json'))['period_key'])")
          cp pages_data.json "history/${PERIOD_KEY}.json"
          echo "[history] saved: history/${PERIOD_KEY}.json"

          python - <<'EOF'
          import json, os, glob
          files = sorted(glob.glob('history/*.json'), reverse=True)
          periods = []
          for f in files:
              if os.path.basename(f) == 'index.json':
                  continue
              try:
                  d = json.load(open(f, encoding='utf-8'))
                  mode = d.get('report_mode', '')
                  mode_label = {'weekly_review': '주간 실적', 'weekly_forecast': '주간 예측', 'monthly': '월간 실적'}.get(mode, mode)
                  periods.append({
                      'key':          d.get('period_key', ''),
                      'label':        d.get('period', {}).get('label', ''),
                      'mode':         mode,
                      'mode_label':   mode_label,
                      'generated_at': d.get('generated_at', ''),
                      'file':         os.path.basename(f),
                  })
              except Exception as e:
                  print(f"skip {f}: {e}")
          json.dump({'periods': periods}, open('history/index.json', 'w', encoding='utf-8'), ensure_ascii=False, indent=2)
          print(f"[history] index.json: {len(periods)}개 기간")
          EOF

      - name: Commit history to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history/
          git diff --staged --quiet || git commit -m "chore: update history [skip ci]"
          git push

      - name: Prepare site
        run: |
          mkdir -p site/history
          cp dashboard.html site/index.html
          cp pages_data.json site/pages_data.json
          cp history/*.json site/history/

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
