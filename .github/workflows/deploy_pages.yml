name: Deploy SCM Dashboard to Pages

on:
  schedule:
    - cron: '0 0 * * 1'   # 매주 월요일 09:00 KST (weekly_review)
    - cron: '0 0 1 * *'   # 매월  1일  09:00 KST (monthly)
  workflow_dispatch:
    inputs:
      report_mode:
        description: '리포트 모드 선택'
        type: choice
        options:
          - weekly_review
          - weekly_forecast
          - monthly
        default: weekly_review
      skip_delay:
        description: '즉시 실행 (지연 없음)'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect report mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.report_mode }}" >> $GITHUB_OUTPUT
          elif [ "$(date +%d)" = "01" ]; then
            echo "mode=monthly" >> $GITHUB_OUTPUT
          else
            echo "mode=weekly_review" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyairtable

      - name: Override delay (수동 실행 시)
        if: github.event_name == 'workflow_dispatch' && inputs.skip_delay == true
        run: echo "SKIP_DELAY=1" >> $GITHUB_ENV

      - name: Run unified SCM report generator
        env:
          AIRTABLE_API_KEY_WMS: ${{ secrets.AIRTABLE_API_KEY_WMS }}
          AIRTABLE_API_KEY_TMS: ${{ secrets.AIRTABLE_API_KEY_TMS }}
          AIRTABLE_BASE_WMS_ID: ${{ secrets.AIRTABLE_BASE_WMS_ID }}
          AIRTABLE_BASE_TMS_ID: ${{ secrets.AIRTABLE_BASE_TMS_ID }}
          KAKAO_REST_API_KEY:   ${{ secrets.KAKAO_REST_API_KEY }}
          REPORT_MODE:          ${{ steps.mode.outputs.mode }}
          SKIP_DELAY:           ${{ env.SKIP_DELAY || '0' }}
        run: python pages/generate_scm_report.py

      - name: Save to history & build index
        run: |
          mkdir -p history
          PERIOD_KEY=$(python -c "import json; print(json.load(open('pages_data.json'))['period_key'])")
          cp pages_data.json "history/${PERIOD_KEY}.json"
          echo "[history] saved: history/${PERIOD_KEY}.json"

          python - <<'EOF'
          import json, os, glob
          files = sorted(glob.glob('history/*.json'), reverse=True)
          periods = []
          for f in files:
              if os.path.basename(f) == 'index.json':
                  continue
              try:
                  d = json.load(open(f, encoding='utf-8'))
                  mode = d.get('report_mode', '')
                  mode_label = {
                      'weekly_review':   '주간 실적',
                      'weekly_forecast': '주간 예측',
                      'monthly':         '월간 실적',
                  }.get(mode, mode)
                  periods.append({
                      'key':          d.get('period_key', ''),
                      'label':        d.get('period', {}).get('label', ''),
                      'mode':         mode,
                      'mode_label':   mode_label,
                      'generated_at': d.get('generated_at', ''),
                      'file':         os.path.basename(f),
                  })
              except Exception as e:
                  print(f"skip {f}: {e}")
          json.dump({'periods': periods},
                    open('history/index.json', 'w', encoding='utf-8'),
                    ensure_ascii=False, indent=2)
          print(f"[history] index.json: {len(periods)}개")
          EOF

      - name: Commit history to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history/
          [ -f docs/weekly.html  ] && git add docs/weekly.html  || true
          [ -f docs/monthly.html ] && git add docs/monthly.html || true
          git diff --staged --quiet || git commit -m "chore: update scm report [skip ci]"
          git push

      - name: Prepare site
        run: |
          mkdir -p site/history

          # 메인 대시보드 (4탭 통합)
          cp pages/dashboard.html    site/index.html
          cp pages_data.json         site/pages_data.json

          # 주간/월간 전용 리포트 페이지 (JSON 이미 주입됨)
          [ -f docs/weekly.html  ] && cp docs/weekly.html  site/weekly.html  || echo "[skip] weekly.html 없음"
          [ -f docs/monthly.html ] && cp docs/monthly.html site/monthly.html || echo "[skip] monthly.html 없음"

          # 히스토리
          cp history/*.json site/history/

          echo "site/ 구조:"
          ls -la site/

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
