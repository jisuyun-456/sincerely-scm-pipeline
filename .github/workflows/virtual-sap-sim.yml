name: Virtual SAP Simulation

on:
  schedule:
    # Continuous tick every 30 min (24/7 sim, steps are internally time-gated)
    - cron: '*/30 * * * *'
    # Daily batch at 02:00 KST (17:00 UTC) — period-close check included
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      mode:
        type: choice
        options: [manual, daily, backfill, continuous]
        default: continuous
        description: Simulation mode
      orders:
        type: string
        default: '2'
        description: Orders to generate per tick
      dry_run:
        type: boolean
        default: false
        description: Dry run (no DB writes)

concurrency:
  group: virtual-sap-sim
  cancel-in-progress: false  # never cancel mid-tick

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-virtual-sap.txt

      - name: Install dependencies
        run: pip install -r requirements-virtual-sap.txt pytest

      - name: Validate (dry-run tests, no DB)
        env:
          VSAP_SUPABASE_URL: https://fake.supabase.co
          VSAP_SUPABASE_SERVICE_KEY: fake-key
          VSAP_DRY_RUN: "true"
          VSAP_MODE: manual
          VSAP_ORDERS_PER_TICK: "2"
        run: pytest tests/virtual_sap/ -v

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "*/30 * * * *" ]; then
              echo "mode=continuous" >> $GITHUB_OUTPUT
            else
              echo "mode=daily" >> $GITHUB_OUTPUT
            fi
          else
            echo "mode=${{ github.event.inputs.mode || 'continuous' }}" >> $GITHUB_OUTPUT
          fi

      - name: Run simulation tick
        env:
          VSAP_SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          VSAP_SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VSAP_MODE:                 ${{ steps.mode.outputs.mode }}
          VSAP_DRY_RUN:              ${{ github.event.inputs.dry_run || 'false' }}
          VSAP_ORDERS_PER_TICK:      ${{ github.event.inputs.orders || '2' }}
          SLACK_BOT_TOKEN:           ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_DM_USER_ID:          ${{ secrets.SLACK_DM_USER_ID }}
        run: python -m harness.virtual_sap.cli tick --mode ${{ steps.mode.outputs.mode }}

      - name: Run 출고확인서 agent
        env:
          VSAP_SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          VSAP_SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SLACK_BOT_TOKEN:           ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_DM_USER_ID:          ${{ secrets.SLACK_DM_USER_ID }}
        run: python -m harness.virtual_sap.agents.delivery_confirm_agent

      - name: Run 고객출고알림 agent
        env:
          VSAP_SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          VSAP_SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m harness.virtual_sap.agents.customer_notify_agent

      - name: Run 자재출고요청 agent
        env:
          VSAP_SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          VSAP_SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m harness.virtual_sap.agents.material_release_agent

      - name: Run 임가공출고요청 agent
        env:
          VSAP_SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          VSAP_SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m harness.virtual_sap.agents.oem_release_agent

      - name: Notify on failure
        if: failure()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_DM_USER_ID: ${{ secrets.SLACK_DM_USER_ID }}
        run: |
          python - <<'EOF'
          import os, urllib.request, json, sys
          token = os.environ.get("SLACK_BOT_TOKEN", "")
          user  = os.environ.get("SLACK_DM_USER_ID", "")
          if not token or not user:
              print("Slack secrets not configured — skipping DM", flush=True)
              sys.exit(0)
          run_url = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          text = (
              ":x: *Virtual SAP tick FAILED*\n"
              "Run `${{ github.run_id }}` (attempt ${{ github.run_attempt }})\n"
              f"<{run_url}|View run>"
          )
          body = json.dumps({"channel": user, "text": text}).encode()
          req = urllib.request.Request(
              "https://slack.com/api/chat.postMessage",
              data=body,
              headers={"Content-Type": "application/json", "Authorization": f"Bearer {token}"},
          )
          with urllib.request.urlopen(req) as resp:
              result = json.loads(resp.read())
          if not result.get("ok"):
              print(f"Slack error: {result.get('error')}", flush=True)
              sys.exit(1)
          EOF

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vsap-run-${{ github.run_id }}
          path: harness/virtual_sap/state/*.json
          retention-days: 14
          if-no-files-found: ignore

  dispatch-advisor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-virtual-sap.txt

      - name: Install dependencies
        run: pip install -r requirements-virtual-sap.txt

      - name: Run 배차추천 agent
        env:
          VSAP_SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          VSAP_SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SLACK_BOT_TOKEN:           ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_DM_USER_ID:          ${{ secrets.SLACK_DM_USER_ID }}
        run: python -m harness.virtual_sap.agents.dispatch_advisor

      - name: Run 운송장기입 agent
        env:
          VSAP_SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          VSAP_SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m harness.virtual_sap.agents.tracking_number_agent
