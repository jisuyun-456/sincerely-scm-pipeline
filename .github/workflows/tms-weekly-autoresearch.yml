name: TMS Weekly AutoResearch

on:
  schedule:
    # 매주 월요일 00:00 UTC = 09:00 KST
    - cron: '0 0 * * 1'
  workflow_dispatch:
    # 수동 실행 버튼 (GitHub Actions UI에서 테스트 가능)

jobs:
  weekly-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-autoresearch.txt

      - name: Install dependencies
        run: pip install -r requirements-autoresearch.txt

      - name: Run TMS Weekly AutoResearch
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
        run: python scripts/tms_weekly_runner.py

      - name: Commit and push report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _AutoResearch/SCM/outputs/ _AutoResearch/SCM/wiki/
          git diff --cached --quiet || git commit -m "chore: TMS 주간 AutoResearch 자동 실행 $(date +'%Y-%m-%d')"
          git push
