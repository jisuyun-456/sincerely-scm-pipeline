name: 📊 Sincerely SCM 월간 출하 리포트

on:
  schedule:
    # 매월 1일 09:00 KST = UTC 00:00
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      skip_delay:
        description: '즉시 실행 (지연 없음)'
        required: false
        default: 'false'
        type: boolean

jobs:
  monthly-report:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pyairtable requests

      - name: Override delay (수동 실행 시)
        if: github.event_name == 'workflow_dispatch' && inputs.skip_delay == 'true'
        run: echo "SKIP_DELAY=1" >> $GITHUB_ENV

      - name: Run monthly report
        env:
          AIRTABLE_API_KEY_TMS:  ${{ secrets.AIRTABLE_API_KEY_TMS }}
          AIRTABLE_BASE_TMS_ID:  ${{ secrets.AIRTABLE_BASE_TMS_ID }}
          SLACK_BOT_TOKEN:       ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_DM_USER_ID:      ${{ secrets.SLACK_DM_USER_ID }}
          SKIP_DELAY:            ${{ env.SKIP_DELAY || '0' }}
        run: python sincerely_monthly_report.py

      - name: Upload JSON archive
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: monthly-report-${{ github.run_id }}
          path: monthly_report_*.json
          retention-days: 365   # 1년 보관

      - name: Notify failure via DM
        if: failure()
        run: |
          python - <<'EOF'
          import os, requests
          token   = os.environ["SLACK_BOT_TOKEN"]
          user_id = os.environ["SLACK_DM_USER_ID"]
          run_url = f"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ch = requests.post(
              "https://slack.com/api/conversations.open",
              headers={"Authorization": f"Bearer {token}"},
              json={"users": user_id}, timeout=10
          ).json()["channel"]["id"]
          requests.post(
              "https://slack.com/api/chat.postMessage",
              headers={"Authorization": f"Bearer {token}"},
              json={"channel": ch, "text": f"❌ SCM 월간 리포트 생성 실패\n{run_url}"},
              timeout=10,
          )
          EOF
        env:
          SLACK_BOT_TOKEN:  ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_DM_USER_ID: ${{ secrets.SLACK_DM_USER_ID }}
