name: Generate Outgoing Confirmation PDF

on:
  repository_dispatch:
    types: [generate-pdf]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Korean font
        run: |
          sudo apt-get install -y fonts-nanum

      - name: Install dependencies
        run: pip install -r pdf/TMS_pdf_requirements.txt

      - name: Generate PDF
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_API_KEY_TMS }}
          PDF_OUTPUT_DIR: /tmp
        run: |
          python pdf/출고확인서_tms.py --record-id "${{ github.event.client_payload.record_id }}"
