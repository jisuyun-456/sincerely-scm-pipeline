name: Generate Outgoing Confirmation PDF

on:
  repository_dispatch:
    types: [generate-pdf]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Korean font
        run: |
          sudo apt-get install -y fonts-nanum
          cp /usr/share/fonts/truetype/nanum/NanumGothic.ttf ./NanumGothic.ttf
          cp /usr/share/fonts/truetype/nanum/NanumGothicBold.ttf ./NanumGothicBold.ttf

      - name: Install dependencies
        run: pip install -r TMS_pdf_requirements.txt
      - name: Install dependencies
        run: pip install -r TMS_pdf_requirements.txt

      - name: Generate PDF
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY_TMS }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_TMS_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          python generate_pdf.py --record-id "${{ github.event.client_payload.record_id }}"
