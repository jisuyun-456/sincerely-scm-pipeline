name: Settlement Daily (기사님 운임 정산)

on:
  schedule:
    # 매일 12:00 UTC = 21:00 KST
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: '정산 날짜 (YYYY-MM-DD). 비워두면 오늘.'
        required: false
        default: ''
      week:
        description: '주간 일괄 모드 — 주 시작일 (YYYY-MM-DD, 월요일). date보다 우선.'
        required: false
        default: ''
      dry_run:
        description: 'Dry-run (실제 쓰기 없이 미리보기)'
        type: boolean
        required: false
        default: false

jobs:
  settlement:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-autoresearch.txt

      - name: Install dependencies
        run: pip install -r requirements-autoresearch.txt

      - name: Run settlement calc
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_DM_USER_ID: ${{ secrets.SLACK_DM_USER_ID }}
        run: |
          ARGS="--auto-confirm"
          if [ -n "${{ github.event.inputs.week }}" ]; then
            ARGS="$ARGS --week ${{ github.event.inputs.week }}"
          elif [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python harness/settlement/settlement_calc.py $ARGS
