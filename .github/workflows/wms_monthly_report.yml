name: WMS Monthly Report

on:
  schedule:
    - cron: '0 0 1 * *'   # 매월 1일 00:00 UTC = 09:00 KST
  workflow_dispatch:
    inputs:
      skip_delay:
        description: 'Skip random delay (for manual test)'
        type: boolean
        default: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run WMS monthly report
        env:
          AIRTABLE_API_KEY_WMS: ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE_WMS_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_DM_USER_ID: ${{ secrets.SLACK_DM_USER_ID }}
          SKIP_DELAY: ${{ inputs.skip_delay == true && '1' || '0' }}
        run: python sincerely_wms_monthly_report.py

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wms-monthly-report-${{ github.run_id }}
          path: wms_monthly_report_*.json
          retention-days: 365

      - name: Notify failure
        if: failure()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_DM_USER_ID: ${{ secrets.SLACK_DM_USER_ID }}
        run: |
          python - <<'EOF'
          import os, requests
          token   = os.environ["SLACK_BOT_TOKEN"]
          user_id = os.environ["SLACK_DM_USER_ID"]
          run_url = "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          ch = requests.post("https://slack.com/api/conversations.open",
                             headers=headers, json={"users": user_id}).json()["channel"]["id"]
          requests.post("https://slack.com/api/chat.postMessage",
                        headers=headers,
                        json={"channel": ch,
                              "text": f"[WMS 월간 리포트] 실행 실패 {run_url}"})
          EOF
