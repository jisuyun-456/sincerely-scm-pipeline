name: SCM Daily Briefing

on:
  schedule:
    # 매일 09:00 KST (00:00 UTC)
    - cron: "0 0 * * 1-5"
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate daily briefing
        run: python scripts/daily_briefing.py

      - name: Commit briefing
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _AutoResearch/SCM/outputs/daily-*.md _AutoResearch/SCM/wiki/index.md
          git diff --cached --quiet || git commit -m "chore(briefing): daily SCM briefing $(date +%Y-%m-%d)"
          git push
