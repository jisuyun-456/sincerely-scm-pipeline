name: Weekly Full Pipeline (TMS + WMS)

on:
  schedule:
    # 매주 월요일 12:00 UTC = 21:00 KST
    - cron: '0 12 * * 1'
  workflow_dispatch:

jobs:
  weekly-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-autoresearch.txt

      - name: Install dependencies
        run: pip install -r requirements-autoresearch.txt

      # ── Step 1: TMS 주간분석 리포트 (백필) ──────────────────────────────
      - name: TMS Weekly Backfill (주간분석 리포트)
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_DM_USER_ID: ${{ secrets.SLACK_DM_USER_ID }}
        run: python scripts/tms_weekly_backfill.py

      # ── Step 2: TMS AutoResearch ─────────────────────────────────────────
      - name: TMS Weekly AutoResearch
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_DM_USER_ID: ${{ secrets.SLACK_DM_USER_ID }}
        run: python scripts/tms_weekly_runner.py

      # ── Step 3: WMS SAP 백필 ─────────────────────────────────────────────
      - name: WMS SAP Weekly Backfill
        env:
          AIRTABLE_WMS_PAT: ${{ secrets.AIRTABLE_API_KEY_WMS }}
        run: python scripts/wms_sap_weekly.py

      # ── Step 4: WMS AutoResearch ─────────────────────────────────────────
      - name: WMS Weekly AutoResearch
        env:
          AIRTABLE_WMS_PAT: ${{ secrets.AIRTABLE_API_KEY_WMS }}
        run: python scripts/wms_weekly_runner.py

      # ── Step 5: graphify 지식 그래프 업데이트 ───────────────────────────────
      - name: Install graphify
        run: pip install "graphifyy[mcp]"

      - name: Run graphify (incremental update)
        run: |
          if [ -f graphify-out/graph.json ]; then
            graphify . \
              --obsidian-dir graphify-out/obsidian \
              --wiki \
              --update
          else
            graphify . \
              --obsidian-dir graphify-out/obsidian \
              --wiki
          fi

      # ── Step 6: Commit & Push ─────────────────────────────────────────────
      - name: Commit and push reports
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            reports/ \
            _AutoResearch/SCM/outputs/ _AutoResearch/SCM/wiki/ \
            graphify-out/graph.json graphify-out/graph.html \
            graphify-out/GRAPH_REPORT.md graphify-out/obsidian/ \
            graphify-out/wiki/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: 주간 파이프라인 자동 실행 $(date +'%Y-W%V')"
          git push
