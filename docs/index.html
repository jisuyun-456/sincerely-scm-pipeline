<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sincerely SCM — 주간 출하 리포트</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #f5f4f0; --surface: #fff; --border: #e8e5de; --border-light: #f0ede6;
  --text: #1a1917; --text2: #6b6860; --text3: #a09d97;
  --green: #1D9E75; --green-bg: #E1F5EE; --green-dk: #085041;
  --red: #E24B4A; --red-bg: #fdf2f2; --red-dk: #A32D2D;
  --amber: #BA7517; --amber-bg: #FAEEDA; --amber-dk: #633806;
  --blue: #185FA5; --blue-bg: #E6F1FB; --blue-dk: #0C447C;
  --purple: #534AB7; --purple-bg: #EEEDFE;
  --r: 10px; --rs: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); }
.page { max-width: 980px; margin: 0 auto; padding: 28px 20px 60px; }

/* header */
.hdr { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 22px; }
.hdr h1 { font-size: 17px; font-weight: 600; letter-spacing: -.3px; }
.hdr p { font-size: 11px; color: var(--text3); margin-top: 3px; }
.pill { font-size: 10px; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
.pill-green { background: var(--green-bg); color: var(--green-dk); border: .5px solid #9FE1CB; }
.pill-gray  { background: #f0ede6; color: var(--text2); border: .5px solid var(--border); }

/* period bar */
.pbar { display: flex; gap: 5px; margin-bottom: 18px; overflow-x: auto; padding-bottom: 2px; }
.pbar::-webkit-scrollbar { display: none; }
.pc { flex-shrink: 0; padding: 5px 14px; border-radius: 20px; font-size: 11px; border: .5px solid var(--border); background: transparent; color: var(--text2); cursor: default; white-space: nowrap; }
.pc.on { background: var(--text); color: #fff; border-color: var(--text); }
.psep { color: var(--text3); font-size: 11px; align-self: center; flex-shrink: 0; }

/* KPI */
.kgrid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 18px; }
.kc { background: var(--surface); border: .5px solid var(--border); border-radius: var(--r); padding: 14px 15px; }
.kl { font-size: 10px; color: var(--text2); margin-bottom: 5px; }
.kv { font-size: 22px; font-weight: 600; line-height: 1; }
.ku { font-size: 11px; font-weight: 400; color: var(--text3); margin-left: 2px; }
.ks { font-size: 10px; margin-top: 5px; }
.ok { color: var(--green); } .ng { color: var(--red); } .warn { color: var(--amber); }

/* section */
.sec { background: var(--surface); border: .5px solid var(--border); border-radius: var(--r); overflow: hidden; margin-bottom: 10px; }
.sh { padding: 11px 16px; border-bottom: .5px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; }
.sh h2 { font-size: 13px; font-weight: 500; }
.sb { padding: 14px 16px; }
.two { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.three { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.stat { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: .5px solid var(--border-light); font-size: 12px; }
.stat:last-child { border-bottom: none; }
.sk { color: var(--text2); }
.sv { font-weight: 500; }
.cw { position: relative; width: 100%; }
.br { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; font-size: 11px; }
.br:last-child { margin-bottom: 0; }
.bn { flex: 0 0 110px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 11px; }
.bt { flex: 1; height: 5px; background: var(--border-light); border-radius: 3px; overflow: hidden; }
.bf { height: 5px; border-radius: 3px; }
.bv { font-size: 10px; color: var(--text2); min-width: 52px; text-align: right; white-space: nowrap; }
.pills { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
.spill { font-size: 10px; padding: 2px 8px; border-radius: 4px; }
.sp-m { background: var(--green-bg); color: var(--green-dk); }
.sp-p { background: var(--amber-bg); color: var(--amber-dk); }
.sp-b { background: var(--blue-bg); color: var(--blue-dk); }
.sp-n { background: var(--border-light); color: var(--text2); }
.tbl { width: 100%; border-collapse: collapse; font-size: 11px; }
.tbl th { text-align: left; padding: 5px 8px; color: var(--text2); font-weight: 400; border-bottom: .5px solid var(--border-light); }
.tbl td { padding: 6px 8px; border-bottom: .5px solid var(--border-light); }
.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: var(--bg); }
.tr { text-align: right; }

/* driver cards */
.dc { background: var(--bg); border-radius: var(--rs); padding: 11px 12px; margin-bottom: 8px; }
.dc:last-child { margin-bottom: 0; }
.dch { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.dname { font-size: 12px; font-weight: 500; }
.dcap { font-size: 10px; color: var(--text3); }
.dpct { font-size: 18px; font-weight: 500; }
.dprog { width: 100%; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
.dpf { height: 6px; border-radius: 3px; }
.dkm { font-size: 10px; color: var(--text3); margin-top: 4px; }

/* alert */
.alert { padding: 9px 12px; border-left: 2px solid; border-radius: 0 var(--rs) var(--rs) 0; margin-top: 8px; }
.alert p { font-size: 11px; margin-bottom: 2px; }
.alert p:last-child { margin-bottom: 0; }
.al-warn { border-color: var(--amber); background: var(--amber-bg); color: var(--amber-dk); }
.al-ok   { border-color: var(--green); background: var(--green-bg); color: var(--green-dk); }
.al-info { border-color: var(--blue);  background: var(--blue-bg);  color: var(--blue-dk); }

/* a1 utilization */
.a1bar { width: 100%; height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; margin: 6px 0; }
.a1fill { height: 10px; border-radius: 5px; }

.footer { text-align: center; font-size: 10px; color: var(--text3); margin-top: 28px; }
@media(max-width:600px) {
  .kgrid { grid-template-columns: repeat(2,1fr); }
  .two,.three { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="page">

<div class="hdr">
  <div>
    <h1>Sincerely SCM — 주간 출하 리포트</h1>
    <p id="hdrsub">로드 중...</p>
  </div>
  <div style="display:flex;gap:6px;align-items:center">
    <span class="pill pill-green">TMS Airtable</span>
    <span class="pill pill-gray" id="gentime">-</span>
  </div>
</div>

<div class="pbar" id="pbar"></div>
<div class="kgrid" id="kgrid"></div>

<!-- 이번주: 일별 CBM -->
<div class="sec">
  <div class="sh"><h2>일별 CBM 현황</h2><span class="pill pill-gray" id="wklabel">-</span></div>
  <div class="sb"><div class="cw" style="height:160px"><canvas id="cDaily"></canvas></div></div>
</div>

<div class="two">
  <!-- 이번주: 출하 요약 -->
  <div class="sec">
    <div class="sh"><h2>출하 요약</h2></div>
    <div class="sb" id="summary"></div>
  </div>
  <!-- 이번주: 박스 구성비 -->
  <div class="sec">
    <div class="sh"><h2>박스 타입 구성비</h2><span class="pill pill-gray" id="boxtotal">-</span></div>
    <div class="sb"><div style="height:140px;position:relative"><canvas id="cBox"></canvas></div></div>
  </div>
</div>

<div class="two">
  <!-- Top 품목 -->
  <div class="sec">
    <div class="sh"><h2>출하 품목 Top (CBM 기준)</h2></div>
    <div class="sb" id="items"></div>
  </div>
  <!-- 운영 품질 KPI -->
  <div class="sec">
    <div class="sh"><h2>운영 품질 KPI</h2></div>
    <div class="sb" id="quality"></div>
  </div>
</div>

<!-- 4주 트렌드 -->
<div class="sec">
  <div class="sh"><h2>최근 4주 물동량 · 손익 트렌드</h2></div>
  <div class="sb">
    <div class="cw" style="height:150px"><canvas id="cTrend"></canvas></div>
    <div id="trendtbl" style="margin-top:10px"></div>
  </div>
</div>

<!-- 이전주: 기사님 CBM + 라우팅 km -->
<div class="two">
  <div class="sec">
    <div class="sh"><h2>기사님 CBM 달성율 (이전주)</h2><span id="prevwk" class="pill pill-gray">-</span></div>
    <div class="sb" id="drivers"></div>
  </div>
  <div class="sec">
    <div class="sh"><h2>기사님 배송 거리 km (이전주)</h2></div>
    <div class="sb" id="routing"></div>
  </div>
</div>

<!-- 이전주: 에이원 창고 가동율 -->
<div class="sec">
  <div class="sh"><h2>에이원센터 창고 가동율 (이전주)</h2></div>
  <div class="sb" id="a1section"></div>
</div>

<!-- 알림 -->
<div class="sec" id="alertsec">
  <div class="sh"><h2>주요 알림</h2></div>
  <div class="sb" id="alerts"></div>
</div>

<div class="footer">Sincerely SCM Weekly Report · <span id="footdate">-</span> · TMS Airtable (app4x70a8mOrIKsMf)</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ============================================================
// REPORT_DATA: GitHub Actions Python이 아래 null을 실제 JSON으로 교체

    },

    quality:{total_records:61,missing_box_qty:44,missing_rate:72.1,same_day_create:8,same_day_rate:13.1,avg_leadtime_days:4.2},
    confidence:21.3,

    top_items:[
      {name:"밸류무선충전마우스패드",qty:770,cbm:10.72},
      {name:"Solid스탠다드G형박스(L)키트",qty:200,cbm:1.81},
      {name:"Motion스탠다드박스 키트",qty:100,cbm:1.31},
      {name:"킵세이프마그넷배터리Slim",qty:150,cbm:0.28}
    ]
  },
  prev_week:{
    summary:{total_cbm:49.8,total_count:57,completed:50,pending:7},
    week_start:"2026-03-09",
    driver_daily:{"신시어리 (이장훈)":{"2026-03-09":2.888,"2026-03-10":1.333,"2026-03-11":0.808,"2026-03-12":6.031,"2026-03-13":3.455},"신시어리 (조희선)":{"2026-03-09":1.334,"2026-03-10":3.738,"2026-03-13":8.204},"신시어리 (박종성)":{"2026-03-09":1.637,"2026-03-10":3.414,"2026-03-11":6.893,"2026-03-12":1.745,"2026-03-13":0.263}},
    driver_weekly:{"신시어리 (이장훈)":14.52,"신시어리 (조희선)":13.28,"신시어리 (박종성)":13.95},
    driver_weekly_max:{"신시어리 (이장훈)":27.0,"신시어리 (조희선)":22.8,"신시어리 (박종성)":47.5},
    driver_pct:{"신시어리 (이장훈)":53.8,"신시어리 (조희선)":58.2,"신시어리 (박종성)":29.4},
    driver_work_days:{"신시어리 (이장훈)":{count:5,labels:["03/09(월)","03/10(화)","03/11(수)","03/12(목)","03/13(금)"]},"신시어리 (조희선)":{count:3,labels:["03/09(월)","03/10(화)","03/13(금)"]},"신시어리 (박종성)":{count:5,labels:["03/09(월)","03/10(화)","03/11(수)","03/12(목)","03/13(금)"]}},
    a1_utilization:{total_cbm:49.8,capacity:44.4,pct:112.2},
    routing:{
      driver_weekly_km:{"신시어리 (이장훈)":198.4,"신시어리 (조희선)":145.2,"신시어리 (박종성)":221.7},
      driver_daily_routes:{"신시어리 (이장훈)":{"2026-03-09":{total_km:45.2,stops:3,depot:"에이원센터"},"2026-03-10":{total_km:38.7,stops:4,depot:"에이원센터"},"2026-03-11":{total_km:22.1,stops:2,depot:"에이원센터"},"2026-03-12":{total_km:58.4,stops:5,depot:"에이원센터"},"2026-03-13":{total_km:34.0,stops:3,depot:"에이원센터"}},"신시어리 (조희선)":{"2026-03-09":{total_km:41.2,stops:3,depot:"에이원센터"},"2026-03-10":{total_km:52.3,stops:4,depot:"에이원센터"},"2026-03-13":{total_km:51.7,stops:4,depot:"에이원센터"}},"신시어리 (박종성)":{"2026-03-09":{total_km:38.5,stops:3,depot:"다영기획"},"2026-03-10":{total_km:44.1,stops:4,depot:"에이원센터"},"2026-03-11":{total_km:52.0,stops:4,depot:"에이원센터"},"2026-03-12":{total_km:49.8,stops:5,depot:"에이원센터"},"2026-03-13":{total_km:37.3,stops:3,depot:"에이원센터"}}}
    }
  },
  next_week:{summary:{total_count:48,total_cbm:14.2}},
  trend:[
    {week:"2/24주",cbm:8.4,revenue:0,cost:820000,profit:-820000,count:42},
    {week:"3/2주",cbm:8.4,revenue:0,cost:820000,profit:-820000,count:57},
    {week:"3/9주",cbm:49.8,revenue:0,cost:1734500,profit:-1734500,count:57},
    {week:"3/16주",cbm:17.4,revenue:0,cost:0,profit:0,count:61}
  ]
};

const D = REPORT_DATA || SAMPLE;
const W = D.this_week;
const P = D.prev_week;
const S = W.summary;
const WD = ["일","월","화","수","목","금","토"];
const fmt = n => isNaN(n)?'—':Math.round(n).toLocaleString('ko-KR');
const fmtD = s => { const d=new Date(s+'T00:00:00'); return `${d.getMonth()+1}/${String(d.getDate()).padStart(2,'0')}`; };
const fmtWD = s => WD[new Date(s+'T00:00:00').getDay()];

// header
const ws = new Date(D.week_start+'T00:00:00');
const we = new Date(ws); we.setDate(we.getDate()+4);
document.getElementById('hdrsub').textContent =
  `${ws.getMonth()+1}월 ${Math.ceil(ws.getDate()/7)}주차 · ${fmtD(D.week_start)}(월) ~ ${we.getMonth()+1}/${String(we.getDate()).padStart(2,'0')}(금)`;
document.getElementById('gentime').textContent =
  new Date(D.generated_at).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
document.getElementById('footdate').textContent = new Date(D.generated_at).toLocaleDateString('ko-KR');
document.getElementById('wklabel').textContent = `${fmtD(D.week_start)} ~ ${we.getMonth()+1}/${String(we.getDate()).padStart(2,'0')}`;

// period bar
const pb = document.getElementById('pbar');
['W11 (이전주)','W12 (이번주)','W13 (다음주)'].forEach((l,i)=>{
  const el=document.createElement('div');
  el.className='pc'+(i===1?' on':'');
  el.textContent=l; pb.appendChild(el);
});

// KPI
const doneRate = S.total_count ? Math.round(S.completed/S.total_count*100) : 0;
document.getElementById('kgrid').innerHTML = `
  <div class="kc"><div class="kl">총 출하 건수</div><div class="kv">${S.total_count}<span class="ku">건</span></div><div class="ks">완료 ${S.completed} / 대기 ${S.pending}</div></div>
  <div class="kc"><div class="kl">총 CBM</div><div class="kv">${S.total_cbm.toFixed(1)}<span class="ku">m³</span></div><div class="ks">건당 ${S.cbm_per_shipment.toFixed(3)}m³</div></div>
  <div class="kc"><div class="kl">완료율</div><div class="kv ${doneRate>=80?'ok':'warn'}">${doneRate}<span class="ku">%</span></div><div class="ks ${doneRate>=80?'ok':'warn'}">${doneRate>=80?'목표 달성':'진행 중'}</div></div>
  <div class="kc"><div class="kl">CBM 신뢰도</div><div class="kv ${W.confidence>=70?'ok':W.confidence>=40?'warn':'ng'}">${W.confidence.toFixed(1)}<span class="ku">%</span></div><div class="ks ${W.confidence>=70?'ok':W.confidence>=40?'warn':'ng'}">${W.confidence>=70?'양호':W.confidence>=40?'보통':'낮음'}</div></div>`;

// daily chart
const dkeys = Object.keys(W.by_date).sort();
const cbmVals = dkeys.map(k=>W.by_date[k].cbm);
const cntVals = dkeys.map(k=>W.by_date[k].count);
const maxCbm = Math.max(...cbmVals,1);
new Chart(document.getElementById('cDaily'),{
  type:'bar',
  data:{labels:dkeys.map(d=>`${fmtD(d)}(${fmtWD(d)})`),datasets:[
    {label:'CBM',data:cbmVals,yAxisID:'y',backgroundColor:cbmVals.map(v=>v===maxCbm?'#1D9E75':'#85B7EB'),borderRadius:4},
    {label:'건수',data:cntVals,type:'line',yAxisID:'y2',borderColor:'#AFA9EC',backgroundColor:'transparent',pointRadius:3,pointBackgroundColor:'#AFA9EC',borderWidth:1.5,tension:0.3}
  ]},
  options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.datasetIndex===0?`CBM: ${c.raw.toFixed(2)}m³`:`건수: ${c.raw}건`}}},
    scales:{x:{ticks:{font:{size:10}},grid:{display:false}},y:{position:'left',ticks:{font:{size:9},callback:v=>v+'m³'},grid:{color:'#f0ede6'}},y2:{position:'right',ticks:{font:{size:9}},grid:{display:false}}}}
});

// summary
const sEl = document.getElementById('summary');
sEl.innerHTML = `
  <div class="stat"><span class="sk">총 출하 건수</span><span class="sv">${S.total_count}건</span></div>
  <div class="stat"><span class="sk">총 CBM</span><span class="sv">${S.total_cbm.toFixed(2)} m³</span></div>
  <div class="stat"><span class="sk">완료</span><span class="sv ok">${S.completed}건</span></div>
  <div class="stat"><span class="sk">대기</span><span class="sv warn">${S.pending}건</span></div>
  <div class="stat"><span class="sk">건당 평균 CBM</span><span class="sv">${S.cbm_per_shipment.toFixed(3)} m³</span></div>
  <div class="stat"><span class="sk">물류매출</span><span class="sv">${S.revenue>0?fmt(S.revenue)+'원':'—'}</span></div>
  <div class="stat"><span class="sk">운송비용</span><span class="sv">${S.cost>0?fmt(S.cost)+'원':'—'}</span></div>
  <div class="stat"><span class="sk">손익</span><span class="sv ${S.profit>=0?'ok':'ng'}">${S.profit!==0?(S.profit>=0?'+':'')+fmt(S.profit)+'원':'—'}</span></div>
  <div class="stat"><span class="sk">CBM당 물류비</span><span class="sv">${S.cbm_unit_cost>0?fmt(S.cbm_unit_cost)+'원/m³':'—'}</span></div>`;

// box chart
const bt = W.box_type;
document.getElementById('boxtotal').textContent = `총 ${bt.total}박스`;
const bColors = {'극소':'#B5D4F4','소':'#85B7EB','중':'#5DCAA5','중대':'#1D9E75','대':'#EF9F27','특대':'#E24B4A'};
if(bt.total>0){
  new Chart(document.getElementById('cBox'),{
    type:'doughnut',
    data:{labels:Object.keys(bt.counts),datasets:[{data:Object.values(bt.counts),backgroundColor:Object.keys(bt.counts).map(k=>bColors[k]||'#aaa'),borderWidth:0,hoverOffset:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:10},boxWidth:10,padding:6}},tooltip:{callbacks:{label:c=>`${c.label}: ${bt.pct[c.label]||0}% (${c.raw}박스)`}}}}
  });
} else {
  document.getElementById('cBox').parentElement.innerHTML = '<p style="font-size:12px;color:var(--text3);text-align:center;padding-top:40px">박스 데이터 없음</p>';
}

// top items
const iel = document.getElementById('items');
if(W.top_items&&W.top_items.length){
  const maxIcbm = Math.max(...W.top_items.map(i=>i.cbm),1);
  iel.innerHTML = W.top_items.map((item,i)=>`
    <div class="br">
      <span class="bn">${i+1}. ${item.name}</span>
      <div class="bt"><div class="bf" style="width:${Math.round(item.cbm/maxIcbm*100)}%;background:#5DCAA5"></div></div>
      <span class="bv">${item.cbm.toFixed(3)}m³</span>
    </div>`).join('');
} else { iel.innerHTML='<p style="font-size:12px;color:var(--text3)">품목 데이터 없음</p>'; }

// quality
const Q = W.quality;
const src = W.cbm_sources;
document.getElementById('quality').innerHTML = `
  <div class="stat"><span class="sk">외박스 미기재율</span><span class="sv ${Q.missing_rate>50?'ng':Q.missing_rate>25?'warn':'ok'}">${Q.missing_rate.toFixed(1)}% (${Q.missing_box_qty}/${Q.total_records}건)</span></div>
  <div class="stat"><span class="sk">당일 등록 비율</span><span class="sv">${Q.same_day_rate.toFixed(1)}% (${Q.same_day_create}건)</span></div>
  <div class="stat"><span class="sk">평균 리드타임</span><span class="sv">${Q.avg_leadtime_days!=null?Q.avg_leadtime_days.toFixed(1)+'일':'—'}</span></div>
  <div class="stat"><span class="sk">CBM 신뢰도</span><span class="sv ${W.confidence>=70?'ok':W.confidence>=40?'warn':'ng'}">${W.confidence.toFixed(1)}%</span></div>
  <div class="pills">
    <span class="spill sp-m">수동 ${src.manual}건</span>
    <span class="spill sp-p">품목매칭 ${src.product_match}건</span>
    <span class="spill sp-b">박스파싱 ${src.box_parse}건</span>
    <span class="spill sp-n">미산출 ${src.unmatched}건</span>
  </div>`;

// trend chart
if(D.trend&&D.trend.length){
  new Chart(document.getElementById('cTrend'),{
    type:'bar',
    data:{labels:D.trend.map(t=>t.week),datasets:[
      {label:'CBM',data:D.trend.map(t=>t.cbm),backgroundColor:'#85B7EB',borderRadius:4,yAxisID:'y'},
      {label:'건수',data:D.trend.map(t=>t.count),type:'line',borderColor:'#5DCAA5',backgroundColor:'transparent',pointRadius:3,pointBackgroundColor:'#5DCAA5',borderWidth:1.5,yAxisID:'y2',tension:0.3}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{font:{size:10}},grid:{display:false}},y:{position:'left',ticks:{font:{size:9},callback:v=>v+'m³'},grid:{color:'#f0ede6'}},y2:{position:'right',ticks:{font:{size:9}},grid:{display:false}}}}
  });
  document.getElementById('trendtbl').innerHTML = `<table class="tbl">
    <thead><tr><th>주차</th><th class="tr">건수</th><th class="tr">CBM</th><th class="tr">비용</th><th class="tr">손익</th></tr></thead>
    <tbody>${D.trend.map(t=>`<tr><td>${t.week}</td><td class="tr">${t.count}건</td><td class="tr">${t.cbm.toFixed(1)}m³</td><td class="tr">${t.cost>0?fmt(t.cost)+'원':'—'}</td><td class="tr" style="color:${t.profit>=0?'var(--green)':'var(--red)'}">${t.profit!==0?(t.profit>=0?'+':'')+fmt(t.profit)+'원':'—'}</td></tr>`).join('')}</tbody>
  </table>`;
}

// prev week label
if(P&&P.week_start){
  const pw=new Date(P.week_start+'T00:00:00');
  const pf=new Date(pw); pf.setDate(pf.getDate()+4);
  document.getElementById('prevwk').textContent=`${pw.getMonth()+1}/${pw.getDate()}(월)~${pf.getMonth()+1}/${pf.getDate()}(금)`;
}

// drivers
const VCBM = {"신시어리 (이장훈)":5.4,"신시어리 (조희선)":7.6,"신시어리 (박종성)":9.5};
const dEl = document.getElementById('drivers');
if(P&&P.driver_pct){
  dEl.innerHTML = Object.entries(VCBM).map(([driver,cap])=>{
    const pct = P.driver_pct[driver]||0;
    const wact = (P.driver_weekly[driver]||0).toFixed(2);
    const wmax = P.driver_weekly_max[driver]||cap;
    const wdays = P.driver_work_days[driver]||{};
    const color = pct>100?'#E24B4A':pct>70?'#1D9E75':'#EF9F27';
    const name = driver.replace('신시어리 ','');
    return `<div class="dc">
      <div class="dch"><span class="dname">${name}</span><span class="dcap">${cap}m³/일 × ${wdays.count||0}일 = ${wmax}m³</span></div>
      <div class="dprog"><div class="dpf" style="width:${Math.min(pct,100)}%;background:${color}"></div></div>
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <span style="font-size:11px;color:var(--text2)">${wact}m³ / ${wmax}m³</span>
        <span class="dpct" style="color:${color}">${pct.toFixed(1)}%${pct>100?' 초과':''}</span>
      </div>
    </div>`;
  }).join('');
} else { dEl.innerHTML='<p style="font-size:12px;color:var(--text3)">이전주 데이터 없음</p>'; }

// routing km
const rEl = document.getElementById('routing');
if(P&&P.routing&&P.routing.driver_weekly_km&&Object.keys(P.routing.driver_weekly_km).length){
  const wkm = P.routing.driver_weekly_km;
  const dr  = P.routing.driver_daily_routes||{};
  const maxKm = Math.max(...Object.values(wkm),1);
  rEl.innerHTML = Object.entries(VCBM).map(([driver])=>{
    const km = wkm[driver]||0;
    const dailyData = dr[driver]||{};
    const name = driver.replace('신시어리 ','');
    const dayRows = Object.entries(dailyData).sort().map(([d,info])=>`
      <div class="br" style="margin-bottom:4px">
        <span style="font-size:10px;color:var(--text2);width:70px;flex-shrink:0">${fmtD(d)}(${fmtWD(d)})</span>
        <div class="bt"><div class="bf" style="width:${maxKm>0?Math.round(info.total_km/maxKm*100):0}%;background:#85B7EB"></div></div>
        <span class="bv">${info.total_km.toFixed(1)}km · ${info.stops}곳</span>
      </div>`).join('');
    return `<div class="dc">
      <div class="dch"><span class="dname">${name}</span><span style="font-size:17px;font-weight:500;color:#185FA5">${km.toFixed(1)}<span style="font-size:10px;color:var(--text3);margin-left:2px">km</span></span></div>
      ${dayRows}
    </div>`;
  }).join('');
} else { rEl.innerHTML='<p style="font-size:12px;color:var(--text3)">라우팅 데이터 없음 (KAKAO_REST_API_KEY 설정 확인)</p>'; }

// a1
const a1El = document.getElementById('a1section');
if(P&&P.a1_utilization){
  const a1 = P.a1_utilization;
  const pct = a1.pct;
  const color = pct>120?'#E24B4A':pct>100?'#EF9F27':pct>70?'#1D9E75':'#85B7EB';
  a1El.innerHTML = `
    <div class="two" style="margin-bottom:0">
      <div>
        <div class="stat"><span class="sk">창고 총 용량</span><span class="sv">${a1.capacity} m³</span></div>
        <div class="stat"><span class="sk">주간 총 출하</span><span class="sv" style="color:${color}">${a1.total_cbm.toFixed(2)} m³</span></div>
        <div class="stat"><span class="sk">가동율</span><span class="sv" style="color:${color}">${pct.toFixed(1)}%</span></div>
        ${pct>100?`<div class="stat"><span class="sk">초과분</span><span class="sv ng">+${(a1.total_cbm-a1.capacity).toFixed(2)} m³</span></div>`:''}
      </div>
      <div>
        <div style="font-size:10px;color:var(--text2);margin-bottom:6px">가동율 시각화</div>
        <div class="a1bar"><div class="a1fill" style="width:${Math.min(pct,100)}%;background:${color}"></div></div>
        <div style="font-size:28px;font-weight:500;color:${color};margin-top:6px">${pct.toFixed(1)}<span style="font-size:12px;color:var(--text3);margin-left:2px">%</span></div>
        <div style="font-size:10px;color:var(--text3);margin-top:3px">에이원센터 44.4m³ 기준</div>
      </div>
    </div>`;
}

// alerts
const alerts = [];
if(S.pending>5) alerts.push({type:'warn',msg:`미완료 출하 ${S.pending}건 — 진행 상황 확인 필요`});
if(Q.missing_rate>50) alerts.push({type:'warn',msg:`외박스 수량 미기재율 ${Q.missing_rate.toFixed(0)}% (${Q.missing_box_qty}건) — CBM 신뢰도 저하`});
if(S.total_cbm>25) alerts.push({type:'info',msg:`주간 CBM ${S.total_cbm.toFixed(1)}m³ 초과 — 차량 용량 사전 조율 권장`});
if(P&&P.a1_utilization&&P.a1_utilization.pct>100) alerts.push({type:'warn',msg:`이전주 에이원 창고 가동율 ${P.a1_utilization.pct.toFixed(1)}% — 용량 초과 확인 필요`});
if(!alerts.length) alerts.push({type:'ok',msg:'특이 사항 없음'});
document.getElementById('alerts').innerHTML = `<div class="alert al-${alerts[0].type}">${alerts.map(a=>`<p>${a.msg}</p>`).join('')}</div>`;
</script>
</body>
</html>
